      - name: Install pinned dependencies
        run: npm ci

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Verify local recovery contracts
        run: npm run verify:recovery

  complete-browser-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/documents/requirements.txt

      - name: Install pinned application and document dependencies
        run: |
          npm ci
          python -m pip install -r workers/documents/requirements.txt

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Prepare the local installation
        run: npm run setup:local

      - name: Run every isolated desktop and mobile browser specification
        env:
          LICENSE_DOCUMENT_PYTHON: python
        run: npm run test:e2e

      - name: Upload complete browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: complete-browser-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7
