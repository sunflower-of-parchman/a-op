name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Verify foundation
        run: npm run verify:foundation

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public journeys
        run: npm run test:e2e -- tests/e2e/foundation.spec.ts --project=chromium

      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  authority-spine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify local authority and fulfillment spine
        run: npm run verify:spine

      - name: Upload authority evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: authority-spine-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  artist-administration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify artist administration
        run: npm run verify:administration

      - name: Upload administration evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: artist-administration-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  music-licensing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/documents/requirements.txt

      - name: Install pinned dependencies
        run: |
          npm ci
          python -m pip install -r workers/documents/requirements.txt

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare the local installation
        run: npm run setup:local

      - name: Verify licensing authority and documents
        env:
          LICENSE_DOCUMENT_PYTHON: python
        run: npm run verify:licensing

      - name: Reset the fictional demonstration
        run: npm run seed:reset

      - name: Run licensing journeys
        env:
          LICENSE_DOCUMENT_PYTHON: python
        run: npm run test:e2e -- tests/e2e/licensing.spec.ts

      - name: Upload licensing evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: music-licensing-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  learning-video-editorial:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare the local installation
        run: npm run setup:local

      - name: Verify learning, video, and editorial authority
        run: npm run verify:learning

      - name: Reset the fictional demonstration
        run: npm run seed:reset

      - name: Run learning, video, and editorial journeys
        run: npm run test:e2e -- tests/e2e/learning.spec.ts

      - name: Upload learning evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: learning-video-editorial-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  privacy-operations:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare the local installation
        run: npm run setup:local

      - name: Verify privacy and redacted operations
        run: npm run verify:telemetry

      - name: Reset the fictional demonstration
        run: npm run seed:reset

      - name: Run privacy and operations journeys
        run: npm run test:e2e -- tests/e2e/telemetry.spec.ts

      - name: Upload privacy evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: privacy-operations-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  codex-guided-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Verify guided personalization and approval boundaries
        run: npm run verify:setup
