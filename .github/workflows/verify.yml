      - name: Verify learning, video, and editorial authority
        run: npm run verify:learning

      - name: Reset the fictional demonstration
        run: npm run seed:reset

      - name: Run learning, video, and editorial journeys
        run: npm run test:e2e -- tests/e2e/learning.spec.ts

      - name: Upload learning evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: learning-video-editorial-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  privacy-operations:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare the local installation
        run: npm run setup:local

      - name: Verify privacy and redacted operations
        run: npm run verify:telemetry

      - name: Reset the fictional demonstration
        run: npm run seed:reset

      - name: Run privacy and operations journeys
        run: npm run test:e2e -- tests/e2e/telemetry.spec.ts

      - name: Upload privacy evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: privacy-operations-evidence
          path: |
            playwright-report
            test-results
          retention-days: 7

  codex-guided-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Verify guided personalization and approval boundaries
        run: npm run verify:setup

  artist-portability:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Verify deterministic export and disposable restore
        run: npm run verify:portability

  security-accessibility-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare the disposable local installation
        run: npm run setup:local

      - name: Verify browser and database hardening
        run: npm run verify:hardening

      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-evidence
          path: |
            playwright-report
            test-results
